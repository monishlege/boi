services:
  - type: web
    name: ciphervault-ai-backend
    env: python
    repo: https://github.com/monishlege/boi.git
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free